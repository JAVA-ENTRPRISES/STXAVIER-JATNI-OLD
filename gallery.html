<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>St. Xaviers High School</title>

    <!-- tailwind css -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body class="bg-gray-50">
    <div id="header"></div>
    <section class="bg-gray-800 text-white py-14">
       <div class="max-w-7xl mx-auto px-4 text-center">
          <h1 class="text-3xl md:text-4xl font-bold">
            Gallery
          </h1>
          <p class="mt-3 text-blue-100">
            Capturing moments of learning, growth, and joyful experiences
          </p>
        </div>
    </section>
    <!-- ================= GALLERY SECTION ================= -->
    <section class="py-16 bg-white">
      <div class="max-w-7xl mx-auto px-4">

        <!-- Gallery Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
          <!-- Image Item -->
          <div class="group relative overflow-hidden rounded-2xl shadow-lg">
            <img
              src="images/annual.jpg"
              alt="School Event"
              class="w-full h-64 object-cover transform group-hover:scale-110 transition duration-500"
            />
            <div
              class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition"
            ></div>
            <div
              class="absolute inset-0 flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition"
            >
              <h3 class="text-lg font-semibold">Annual Day</h3>
            </div>
          </div>

          <div class="group relative overflow-hidden rounded-2xl shadow-lg">
            <img
              src="images/act.jpg"
              alt="Classroom Activity"
              class="w-full h-64 object-cover transform group-hover:scale-110 transition duration-500"
            />
            <div
              class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition"
            ></div>
            <div
              class="absolute inset-0 flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition"
            >
              <h3 class="text-lg font-semibold">Classroom Activities</h3>
            </div>
          </div>

          <div class="group relative overflow-hidden rounded-2xl shadow-lg">
            <img
              src="images/sport.jpg"
              alt="Sports Day"
              class="w-full h-64 object-cover transform group-hover:scale-110 transition duration-500"
            />
            <div
              class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition"
            ></div>
            <div
              class="absolute inset-0 flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition"
            >
              <h3 class="text-lg font-semibold">Sports Day</h3>
            </div>
          </div>

          <div class="group relative overflow-hidden rounded-2xl shadow-lg">
            <img
              src="images/science.jpg"
              alt="Science Exhibition"
              class="w-full h-64 object-cover transform group-hover:scale-110 transition duration-500"
            />
            <div
              class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition"
            ></div>
            <div
              class="absolute inset-0 flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition"
            >
              <h3 class="text-lg font-semibold">Science Exhibition</h3>
            </div>
          </div>

          <div class="group relative overflow-hidden rounded-2xl shadow-lg">
            <img
              src="images/cul.jpg"
              alt="Cultural Program"
              class="w-full h-64 object-cover transform group-hover:scale-110 transition duration-500"
            />
            <div
              class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition"
            ></div>
            <div
              class="absolute inset-0 flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition"
            >
              <h3 class="text-lg font-semibold">Cultural Program</h3>
            </div>
          </div>

          <div class="group relative overflow-hidden rounded-2xl shadow-lg">
            <img
              src="images/cam.jpg"
              alt="Campus View"
              class="w-full h-64 object-cover transform group-hover:scale-110 transition duration-500"
            />
            <div
              class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition"
            ></div>
            <div
              class="absolute inset-0 flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition"
            >
              <h3 class="text-lg font-semibold">Campus View</h3>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div id="footer"></div>
    <script src="js/main.js"></script>
  </body>
</html>
